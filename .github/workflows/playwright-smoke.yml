# Fast E2E on every push/PR: guest flows + WalletConnect address check (~5–15 min).
name: Playwright Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"

jobs:
  smoke:
    name: E2E smoke (guest + WC connect)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_URL: https://near.com
      CI: "true"
      WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
      EVM_PRIVATE_KEY: ${{ secrets.EVM_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Playwright setup
        uses: ./.github/actions/playwright-ci-setup

      - name: Run smoke tests
        run: |
          npx playwright test \
            tests/e2e/near-com/validation \
            tests/e2e/near-com/trade/01-connected-evm-address.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 3
          if-no-files-found: ignore
